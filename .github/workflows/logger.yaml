name: Logging the message on the console

on:
  push:
    branches :
      - main
      - temp
jobs:
  logging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: logging the message in the runner console.
        run: echo "new msg logged."
  
  change_reflections:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Rebuilding the docker compose image with new changes
        run: docker build -t new_github_actions_repo_1 .
  
  run_container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: running the docker container
        run: docker run -it new_github_actions_repo_1 -d -p 4000:4000



          

        
  